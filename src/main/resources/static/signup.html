<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Sign Up</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.9);
            --text-color: #f9fafb;
            --secondary-text: #9ca3af;
            --border-color: #1f2937;
            --accent: #10b981;
            --accent-glow: 0 0 15px rgba(16, 185, 129, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(16,185,129,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.04) 0%, transparent 50%);
        }

        .brand {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: var(--accent-glow);
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 36px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 28px;
            text-align: center;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder { color: var(--secondary-text); }

        input:focus {
            border-color: var(--accent);
            box-shadow: var(--accent-glow);
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
            transition: all 0.3s ease;
            box-shadow: var(--accent-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(16,185,129,0.6);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.875rem;
            color: var(--secondary-text);
            text-align: center;
        }

        .footer-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover { text-decoration: underline; }

        .error {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 6px;
            min-height: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="brand">🤖 Your AI Assistant</div>

<div class="card">
    <h2>Create an account</h2>
    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>
    <div class="error" id="error-msg"></div>
    <button onclick="signup()">Sign Up</button>
    <p class="footer-text">
        Already have an account? <a href="login.html">Login</a>
    </p>
</div>

<script>
    async function signup() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('error-msg');
        errorMsg.textContent = '';

        if (!username || !password) {
            errorMsg.textContent = 'Please enter username and password.';
            return;
        }

        try {
            const res = await fetch('http://localhost:8082/api/auth/signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                alert('Signup successful! Redirecting to login...');
                window.location.href = 'login.html';
            } else {
                errorMsg.textContent = data.message;
            }
        } catch (err) {
            console.error(err);
            errorMsg.textContent = 'Server error. Try again later.';
        }
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') signup();
    });
</script>

</body>
</html>
